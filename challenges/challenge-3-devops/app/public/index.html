<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Challenge</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
        }
        h1 {
            color: #2563eb;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        .quote {
            font-style: italic;
            color: #555;
            margin-top: 2rem;
            padding: 1rem;
            border-left: 4px solid #2563eb;
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the DevOps Challenge! 🚀</h1>
        <p>This application was containerized and deployed using GitHub Copilot.</p>
        
        <div id="quote-box" class="quote">
            Loading quote...
        </div>
        
        <p style="margin-top: 2rem; font-size: 0.9rem; color: #666;">
            Deployed with Kubernetes & Terraform
        </p>
    </div>
    <script>
        fetch('/api/quote')
            .then(response => response.json())
            .then(data => {
                document.getElementById('quote-box').innerText = `"${data.quote}"`;
            })
            .catch(error => {
                document.getElementById('quote-box').innerText = "Failed to load quote.";
                console.error('Error:', error);
            });
    </script>
</body>
</html>
